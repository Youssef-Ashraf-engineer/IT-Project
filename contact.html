<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>Contact Info.</title>
    <style>
        body{
  background-color: #f5f5f5;
  font-family: Arial;
}
        .formcontainer{
            padding: 50px;
            }
            form{

        </form>
    </div>
